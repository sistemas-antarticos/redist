version: '3.8'

services:
  # =================================================================
  # 1. Reverse Proxy (Traefik)
  # =================================================================
  traefik:
    image: traefik:v3.0
    container_name: traefik_router
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"        
      - "8082:8080"    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sistema-network

  # =================================================================
  # 2. Manager (Laravel / Apache)
  # =================================================================
  app:
    image: ghcr.io/sistemas-antarticos/manager:${APP_VERSION:-latest}
    container_name: laravel_app
    restart: always
    volumes:
      - public_storage:/var/www/html/storage/app/public
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-sistema}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
    depends_on:
      - db
    networks:
      - sistema-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.manager.rule=Host(`manager.casperico.com`)"
      - "traefik.http.routers.manager.entrypoints=web"
      - "traefik.http.services.manager.loadbalancer.server.port=80"

  # =================================================================
  # 3. Player (Nginx PWA)
  # =================================================================
  player:
    image: ghcr.io/sistemas-antarticos/player:${APP_VERSION:-latest}
    container_name: nginx_player
    restart: always
    networks:
      - sistema-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.player.rule=Host(`monitor.casperico.com`)"
      - "traefik.http.routers.player.entrypoints=web"
      - "traefik.http.services.player.loadbalancer.server.port=80"

  # =================================================================
  # 4. Database (Postgres)
  # =================================================================
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"  
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sistema}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sistema-network

  # =================================================================
  # 5. Cloudflared (Túnel - Opcional)
  # =================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - sistema-network
    profiles:
      - cloudflared

volumes:
  pgdata:
  public_storage:

networks:
  sistema-network:
    name: sistema-network
    driver: bridge
