version: '3.8'

services:
  # =================================================================
  # 1. Reverse Proxy (Traefik)
  # =================================================================
  traefik:
    image: traefik:v3.0
    container_name: traefik_router
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.file.directory=/etc/traefik/rules"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"        
      - "8082:8080"    
    volumes:
      - ./traefik/rules:/etc/traefik/rules  
    networks:
      - sistema-network

  # =================================================================
  # 2. DNS Server (Technitium)
  # =================================================================
  dns-server:
    image: technitium/dns-server:latest
    container_name: technitium_dns
    hostname: dns-server
    restart: always
    ports:
      - "53:53/udp"      
      - "53:53/tcp"      
      - "5380:5380/tcp"  
    volumes:
      - ./dns-config:/etc/dns
      - ./dns-logs:/var/log/technitium/dns
    environment:
      - DNS_SERVER_DOMAIN=dns-server
    networks:
      - sistema-network

  # =================================================================
  # 3. Manager (Laravel / Apache)
  # =================================================================
  app:
    image: ghcr.io/sistemas-antarticos/manager:latest
    container_name: laravel_app
    restart: always
    volumes:
      - public_storage:/var/www/html/storage/app/public
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-sistema}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
    depends_on:
      - db
    networks:
      - sistema-network

  # =================================================================
  # 4. Player (Nginx PWA)
  # =================================================================
  player:
    image: ghcr.io/sistemas-antarticos/player:latest
    container_name: nginx_player
    restart: always
    networks:
      - sistema-network

  # =================================================================
  # 5. Database (Postgres)
  # =================================================================
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"  
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sistema}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sistema-network

  # =================================================================
  # 6. Portainer
  # =================================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - sistema-network

  # =================================================================
  # 7. Cloudflared (Túnel)
  # =================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - sistema-network

volumes:
  pgdata:
  public_storage:
  portainer_data:

networks:
  sistema-network:
    name: sistema-network
    driver: bridge
